name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: xcodebuild test
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Show available simulators
        run: xcrun simctl list devices available iPhone | head -20
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme LuniqSDK
      - name: Build & test on iOS Simulator
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme LuniqSDK \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

  podspec:
    name: pod lib lint
    runs-on: macos-15
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Lint podspec
        run: pod lib lint --allow-warnings
